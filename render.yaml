services:
  - type: web
    name: netgrid
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: CRAWL_DELAY_MS
        value: "2000"
      - key: MAX_CONCURRENT_CRAWLS
        value: "5"
      - key: CRAWL_WINDOW_START
        value: "02:00"
      - key: CRAWL_WINDOW_END
        value: "06:00"
      - key: POST_CHECK_INTERVAL_HOURS
        value: "6"
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: AHREFS_API_KEY
        sync: false
      - key: SEMRUSH_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false

  # ──────────────────────────────────────────────────────────────────────
  # Cron schedules — Render interprets all schedules as UTC. The comments
  # below show the equivalent Philippines Time (UTC+8) so operators can
  # reason about when each job actually fires locally.
  #
  #   UTC → PH:  add 8 hours
  #   PH  → UTC: subtract 8 hours
  # ──────────────────────────────────────────────────────────────────────

   # SEO scan — runs TWICE A MONTH at 02:00 PH (overnight, low-traffic).
  # Fires at 18:00 UTC on the 1st and 15th of every month, which is
  # 02:00 PH on the 2nd and 16th (UTC → PH adds 8 hours, rolling past
  # midnight). Two scans/month keeps the rotation moving without
  # burning PageSpeed quota or hammering blog hosts; the cron still
  # rotates through the oldest-scanned blog so the network gets full
  # coverage over time.
  - type: cron
    name: netgrid-cron-seo-scan
    runtime: docker
    schedule: "0 18 1,15 * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/seo-scan
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false

  # Post verification — every 6h aligned to PH morning: 02 / 08 / 14 / 20 PH.
  # 02 PH = 18 UTC (prev day), 08 PH = 00 UTC, 14 PH = 06 UTC, 20 PH = 12 UTC.
  - type: cron
    name: netgrid-cron-post-verification
    runtime: docker
    schedule: "0 0,6,12,18 * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/post-verification
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false

  # Monthly reports — 09:00 PH on the 1st of each month.
  # 09:00 PH = 01:00 UTC same day. PDFs land in client inboxes around
  # 9am-10am PH local working hours.
  - type: cron
    name: netgrid-cron-monthly-reports
    runtime: docker
    schedule: "0 1 1 * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/monthly-reports
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false

  # ──────────────────────────────────────────────────────────────────────
  # Auto-publish — 4-way SHARDED. Each blog's UUID is hashed and assigned
  # to exactly one shard (shardForBlog in content-generation-actions.ts).
  # Running four parallel cron services means four times the throughput:
  #
  #   1 shard,  hourly  → ~16-20 blogs/hour →   ~400 posts/day max
  #   4 shards, hourly  → ~64-80 blogs/hour →  ~1,600 posts/day max
  #
  # At 3,500 sites posting weekly (= 500/day average, up to 1,500/day if
  # weekdays cluster), four shards gives enough headroom. Each shard is
  # an independent cron service — drop or add shards later by editing
  # this file. The hash partition guarantees no two shards ever process
  # the same blog (no double-posts).
  #
  # Schedule is hourly UTC (timezone-invariant). Each blog still has its
  # own preferredHour internal slot — the cron just gates when shards
  # can do work.
  # ──────────────────────────────────────────────────────────────────────

  - type: cron
    name: netgrid-cron-auto-publish-0
    runtime: docker
    schedule: "0 * * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/auto-publish?shard=0&shardCount=4
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: CRON_MAX_TIME
        value: "660"

  - type: cron
    name: netgrid-cron-auto-publish-1
    runtime: docker
    schedule: "0 * * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/auto-publish?shard=1&shardCount=4
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: CRON_MAX_TIME
        value: "660"

  - type: cron
    name: netgrid-cron-auto-publish-2
    runtime: docker
    schedule: "0 * * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/auto-publish?shard=2&shardCount=4
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: CRON_MAX_TIME
        value: "660"

  - type: cron
    name: netgrid-cron-auto-publish-3
    runtime: docker
    schedule: "0 * * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/auto-publish?shard=3&shardCount=4
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false
      - key: CRON_MAX_TIME
        value: "660"

  # News refresh: pull recent headlines from Google News + NewsAPI for
  # every vertical, dedup by link, prune items older than 30 days. Twice
  # a week keeps the cache fresh without burning quota on idle days.
  #
  # Schedule: 06:00 PH every Tuesday + Friday.
  # 06:00 PH Tue = 22:00 UTC Mon. 06:00 PH Fri = 22:00 UTC Thu.
  # ISO weekday in cron: 1=Mon, 4=Thu → "0 22 * * 1,4".
  - type: cron
    name: netgrid-cron-refresh-news
    runtime: docker
    schedule: "0 22 * * 1,4"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/refresh-news
      - key: APP_URL
        value: https://netgrid-16f6.onrender.com
      - key: CRON_SECRET
        sync: false
