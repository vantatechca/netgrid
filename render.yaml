services:
  - type: web
    name: netgrid
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: CRAWL_DELAY_MS
        value: "2000"
      - key: MAX_CONCURRENT_CRAWLS
        value: "5"
      - key: CRAWL_WINDOW_START
        value: "02:00"
      - key: CRAWL_WINDOW_END
        value: "06:00"
      - key: POST_CHECK_INTERVAL_HOURS
        value: "6"
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: AHREFS_API_KEY
        sync: false
      - key: SEMRUSH_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: netgrid-cron-seo-scan
    runtime: docker
    schedule: "0 2 * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/seo-scan
      - key: APP_URL
        fromService:
          type: web
          name: netgrid
          property: host
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: netgrid-cron-post-verification
    runtime: docker
    schedule: "0 */6 * * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/post-verification
      - key: APP_URL
        fromService:
          type: web
          name: netgrid
          property: host
      - key: CRON_SECRET
        sync: false

  - type: cron
    name: netgrid-cron-monthly-reports
    runtime: docker
    schedule: "0 1 1 * *"
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/monthly-reports
      - key: APP_URL
        fromService:
          type: web
          name: netgrid
          property: host
      - key: CRON_SECRET
        sync: false

  # Auto-publish: generate + publish posts for every active blog whose cadence
  # window has opened (postsPerDay + postingIntervalHours, or the legacy
  # postingFrequencyDays). Stops per-client when clients.totalBlogsTarget posts
  # have shipped. Runs hourly so sub-day cadences (e.g. 2x/day, every 6h) fire
  # on time.
  - type: cron
    name: netgrid-cron-auto-publish
    runtime: docker
    schedule: "0 */6 * * *"  
    dockerfilePath: ./cron/Dockerfile
    dockerContext: ./cron
    envVars:
      - key: CRON_PATH
        value: /api/cron/auto-publish
      - key: APP_URL
        fromService:
          type: web
          name: netgrid
          property: host
      - key: CRON_SECRET
        sync: false
